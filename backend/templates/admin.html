<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeStay | Admin Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding-top: 80px;
        }

        /* --- 3D Glass Navbar --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .navbar-brand { font-size: 1.5rem; font-weight: 700; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: var(--text); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-link:hover { color: var(--secondary); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* --- 3D Stats Cards --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }

        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transition: 0.4s;
            animation: fadeInUp 0.5s ease forwards;
        }

        .stat-card:hover { transform: translateY(-10px) rotateX(5deg); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .stat-card h3 { font-size: 2.5rem; margin-bottom: 5px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card p { color: #94a3b8; text-transform: uppercase; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; }

        /* --- Premium Tables --- */
        .table-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
            animation: fadeInUp 0.7s ease forwards;
        }

        .table-header { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .table-header h2 { font-size: 1.25rem; }

        table { width: 100%; border-collapse: collapse; color: var(--text); }
        th { text-align: left; padding: 15px; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .badge { padding: 4px 10px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .bg-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .bg-secondary { background: rgba(148, 163, 184, 0.2); color: #94a3b8; border: 1px solid #94a3b8; }

        .btn-delete {
            background: transparent; border: 1px solid #ef4444; color: #ef4444;
            padding: 6px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-delete:hover { background: #ef4444; color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>
<body>

    <nav>
        <a class="navbar-brand" href="/">✨ LuxeStay Admin</a>
        <div class="nav-links">
           
            <a class="nav-link" href="#" onclick="logout()" style="color: #ef4444;">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="total-users">0</h3>
                <p>Total Active Users</p>
            </div>
            <div class="stat-card" style="animation-delay: 0.1s;">
                <h3 id="total-todos">0</h3>
                <p>Registered Hotels</p>
            </div>
            <div class="stat-card" style="animation-delay: 0.2s;">
                <h3 id="completed-todos">0</h3>
                <p>Total Reviews</p>
            </div>
            <div class="stat-card" style="animation-delay: 0.3s;">
                <h3 id="pending-todos">-</h3>
                <p>System Status</p>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>👥 User Management</h2>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Activity</th>
                            <th>Joined</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="users-table">
                        <tr><td colspan="7" style="text-align: center; padding: 40px;">Initializing secure data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>🏨 Hotel Inventory</h2>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Owner</th>
                            <th>Hotel Name</th>
                            <th>Location</th>
                            <th>Price (₹)</th>
                        </tr>
                    </thead>
                    <tbody id="todos-table">
                        <tr><td colspan="5" style="text-align: center; padding: 40px;">Syncing with hotel database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
const user = {
    id: parseInt(localStorage.getItem("user_id"))
};
        // Access Control
        if (!token || role !== "admin") {
            alert('Admin access required!');
            window.location.href = '/';
        }

        async function api(url, method = 'GET', body = null) {
            const options = {
                method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);

            try {
                const res = await fetch(url, options);
                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = '/login';
                    return null;
                }
                if (res.status === 403) {
                    alert('Admin access required!');
                    window.location.href = '/';
                    return null;
                }
                return await res.json();
            } catch (err) {
                console.error("API Error:", err);
                return null;
            }
        }

        // Logic Implementation (Unchanged logic, updated rendering)
        async function loadStats() {
            const data = await api('/api/admin/stats');
            if (!data) return;
            document.getElementById('total-users').textContent = data.total_users;
            document.getElementById('total-todos').textContent = data.total_hotels;
            document.getElementById('completed-todos').textContent = data.total_reviews;
        }

        async function loadUsers() {
            const data = await api('/api/admin/users');
            if (!data) return;
            const tbody = document.getElementById('users-table');
            if (data.users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No users found</td></tr>';
                return;
            }
            // Use (u, index) to get the position in the list
            tbody.innerHTML = data.users.map((u, index) => `
                <tr>
                    <td>${index + 1}</td> 
                    <td style="font-weight: 600;">${escapeHtml(u.username)}</td>
                    <td>${escapeHtml(u.email)}</td>
                    <td>${u.is_admin ? '<span class="badge bg-danger">Admin</span>' : '<span class="badge bg-secondary">User</span>'}</td>
                    <td>${u.completed_todos}/${u.total_todos} Posts</td>
                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                        ${u.id === user.id
                            ? '<span style="color:#4ade80;font-weight:600;">You</span>'
                            : `<button class="btn-delete" onclick="deleteUser(${u.id}, '${escapeHtml(u.username)}')">Delete</button>`
                        }
                    </td>
                </tr>
            `).join('');
        }

        async function loadHotels() {
            const data = await api('/api/admin/hotels');
            if (!data) return;
            const tbody = document.getElementById('todos-table');
            if (data.hotels.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No hotels found</td></tr>';
                return;
            }
           // Use (h, index) to get the position in the list
            tbody.innerHTML = data.hotels.map((h, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${escapeHtml(h.username || "Unknown")}</td>
                    <td style="color: var(--secondary); font-weight: 600;">${escapeHtml(h.name)}</td>
                    <td>📍 ${escapeHtml(h.location)}</td>
                    <td style="color: #4ade80; font-weight: 700;">₹${h.price || h.prices}</td>
                </tr>
            `).join('');
             }

        async function deleteUser(userId, username) {
            if (!confirm(`Permanently delete user "${username}" and all their data?`)) return;
            await api(`/api/admin/users/${userId}`, 'DELETE');
            loadStats(); loadUsers(); loadHotels();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        // Initial Load
        loadStats();
        loadUsers();
        loadHotels();
    </script>
</body>
</html>
